global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: alina-bot
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'alina-bot'
    static_configs:
      - targets: ['alina-bot:8000']
        labels:
          service: 'alina-bot'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']